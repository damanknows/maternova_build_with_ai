services:
  - type: web
    name: maternova-ai-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python ingest.py"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GOOGLE_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
